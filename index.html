<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lordjojo/Johafro's Leech Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <h1>Lordjojo/Johafro's Leech Calculator</h1>
    <button class="undo-btn" onclick="undoLastAction()">Undo</button>
  </div>

  <h2 class="section-title">Active Sessions</h2>

  <div class="earnings-box">
    <span>Active Session Earnings:</span>
    <strong id="active-earnings">0</strong>
  </div>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>

        <th class="start-header">
          <div class="header-wrap">
            <span>Start EXP</span>
            <button onclick="fetchStartAll()">Fetch All Start</button>
          </div>
        </th>

        <th class="end-header">
          <div class="header-wrap">
            <span>Current / End EXP</span>
            <button onclick="fetchEndAll()">Fetch All End</button>
          </div>
        </th>

        <th>Time / EXP / EXP-Hr</th>
        <th>Rate</th>
        <th>Fee</th>
      </tr>
    </thead>

    <tbody id="active-body"></tbody>
  </table>

  <div class="table-toolbar">
    <button onclick="addRow()">+ Add Row</button>
  </div>

  <h2 class="section-title">Completed Sessions</h2>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>
        <th>Start EXP</th>
        <th>End EXP</th>
        <th>Time / EXP / EXP-Hr</th>
        <th>Rate</th>
        <th>Fee</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="completed-body"></tbody>
  </table>

  <script src="exptable.js"></script>
  <script src="script.js"></script>
</body>
</html>
