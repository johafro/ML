<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lordjojo/Johafro's Leech Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <div class="title-with-icons">
      <img src="lordjojo.png" class="title-icon">
      <h1>Lordjojo/Johafro's Leech Calculator</h1>
      <img src="johafro.png" class="title-icon">
    </div>

    <button class="undo-btn" onclick="undoLastAction()">Undo</button>
  </div>

  <h2 class="section-title">Active Sessions</h2>

  <div class="earnings-box">
    <img id="meso-icon" src="Meso Coin.png" class="meso-icon">
    <span>Active Session Earnings:</span>
    <strong id="active-earnings">0</strong>
  </div>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>

        <th class="start-header">
          <div class="header-wrap">
            <span>Start EXP</span>
            <button class="calc-all-btn" onclick="fetchStartAll()">Fetch All Start</button>
          </div>
        </th>

        <th class="end-header">
          <div class="header-wrap">
            <span>Current / End EXP</span>
            <button class="calc-all-btn" onclick="fetchEndAll()">Fetch All End</button>
          </div>
        </th>

        <th>Time Elapsed / EXP Gained</th>
        <th>Rate (EXP / meso)</th>
        <th>Fee (mesos)</th>
      </tr>
    </thead>

    <tbody id="active-body"></tbody>
  </table>

  <div class="table-toolbar below-table-toolbar">
    <button class="row-btn" onclick="addRow()">+ Add Row</button>
  </div>

  <h2 class="section-title completed-title">Completed Sessions</h2>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>
        <th>Start EXP</th>
        <th>Current / End EXP</th>
        <th>Time Elapsed / EXP Gained</th>
        <th>Rate (EXP / meso)</th>
        <th>Fee (mesos)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="completed-body"></tbody>
  </table>

  <script src="exptable.js"></script>
  <script src="script.js"></script>
</body>
</html>
