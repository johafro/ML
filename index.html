<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maple Leech Fee Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Maple Leech Fee Tracker</h1>

  <h2 class="section-title">Active Sessions</h2>

  <div class="table-toolbar">
    <button class="row-btn" onclick="addRow()">+ Add Row</button>
  </div>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>

        <th class="start-header">
          <div class="header-wrap">
            <span>Start EXP</span>
            <button class="calc-all-btn" onclick="fetchStartAll()">Calc. All Start</button>
          </div>
        </th>

        <th class="end-header">
          <div class="header-wrap">
            <span>Current / End EXP</span>
            <button class="calc-all-btn" onclick="fetchEndAll()">Calc. All End</button>
          </div>
        </th>

        <th>EXP Gained</th>
        <th>Rate (EXP / meso)</th>
        <th>Fee (mesos)</th>
      </tr>
    </thead>

    <tbody id="active-body"></tbody>
  </table>

  <h2 class="section-title completed-title">Completed Sessions</h2>

  <table class="exp-table">
    <thead>
      <tr>
        <th>Character</th>
        <th>Start EXP</th>
        <th>Current / End EXP</th>
        <th>EXP Gained</th>
        <th>Rate (EXP / meso)</th>
        <th>Fee (mesos)</th>
      </tr>
    </thead>
    <tbody id="completed-body"></tbody>
  </table>

  <script src="exptable.js"></script>
  <script src="script.js"></script>
</body>
</html>
