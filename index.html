<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Maple Leech Fee Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Maple Leech Fee Tracker</h1>

<table class="exp-table">

<thead>
<tr>
<th>Character</th>

<th class="start-header">
  Start EXP
  <button class="calc-all-btn" onclick="fetchStartAll()">Calc. All Start</button>
</th>

<th class="end-header">
  Current / End EXP
  <button class="calc-all-btn" onclick="fetchEndAll()">Calc. All End</button>
</th>

<th>EXP Gained</th>
<th>Rate (EXP / meso)</th>
<th>Fee (mesos)</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

<tr>
<td>
  <input id="ign1" placeholder="Character 1">
</td>

<td>
  <div class="exp-box">
    <div class="exp-row">
      <label>Level</label>
      <input id="startLevel1" type="number">
    </div>
    <div class="exp-row">
      <label>EXP %</label>
      <input id="startPercent1" type="number" step="0.01">
    </div>
    <div class="exp-row">
      <label>EXP</label>
      <input id="startExp1" type="number">
    </div>
  </div>
</td>

<td>
  <div class="exp-box">
    <div class="exp-row">
      <label>Level</label>
      <input id="endLevel1" type="number">
    </div>
    <div class="exp-row">
      <label>EXP %</label>
      <input id="endPercent1" type="number" step="0.01">
    </div>
    <div class="exp-row">
      <label>EXP</label>
      <input id="endExp1" type="number">
    </div>
  </div>
</td>

<td id="gained1">-</td>

<td>
  <div class="rate-box">
    <input
      id="rateSlider1"
      type="range"
      min="0.1"
      max="4"
      step="0.1"
      value="0.1"
    >
    <input
      id="rate1"
      type="number"
      min="0.1"
      max="4"
      step="0.1"
      value="0.1"
    >
  </div>
</td>

<td>
  <div class="fee-box">
    <div id="fee1">-</div>
    <button onclick="copyFee(1)" class="copy-btn">Copy</button>
  </div>
</td>

<td>
  <button onclick="setStart(1)">Fetch Start</button>
  <button onclick="setEnd(1)">Fetch End</button>
</td>
</tr>

<tr>
<td>
  <input id="ign2" placeholder="Character 2">
</td>

<td>
  <div class="exp-box">
    <div class="exp-row">
      <label>Level</label>
      <input id="startLevel2" type="number">
    </div>
    <div class="exp-row">
      <label>EXP %</label>
      <input id="startPercent2" type="number" step="0.01">
    </div>
    <div class="exp-row">
      <label>EXP</label>
      <input id="startExp2" type="number">
    </div>
  </div>
</td>

<td>
  <div class="exp-box">
    <div class="exp-row">
      <label>Level</label>
      <input id="endLevel2" type="number">
    </div>
    <div class="exp-row">
      <label>EXP %</label>
      <input id="endPercent2" type="number" step="0.01">
    </div>
    <div class="exp-row">
      <label>EXP</label>
      <input id="endExp2" type="number">
    </div>
  </div>
</td>

<td id="gained2">-</td>

<td>
  <div class="rate-box">
    <input
      id="rateSlider2"
      type="range"
      min="0.1"
      max="4"
      step="0.1"
      value="0.1"
    >
    <input
      id="rate2"
      type="number"
      min="0.1"
      max="4"
      step="0.1"
      value="0.1"
    >
  </div>
</td>

<td>
  <div class="fee-box">
    <div id="fee2">-</div>
    <button onclick="copyFee(2)" class="copy-btn">Copy</button>
  </div>
</td>

<td>
  <button onclick="setStart(2)">Fetch Start</button>
  <button onclick="setEnd(2)">Fetch End</button>
</td>
</tr>

</tbody>
</table>

<script src="exptable.js"></script>
<script src="script.js"></script>

</body>
</html>
