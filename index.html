<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lordjojo/Johafro MapleLegends Leech Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Lordjojo/Johafro MapleLegends Leech Tracker</h1>

<h2>Active Sessions</h2>

<div class="earnings-box">
  Active Session Earnings: <strong id="active-earnings">0</strong>
</div>

<table class="exp-table">
  <thead>
    <tr>
      <th>Character</th>
      <th>Start EXP <button onclick="fetchStartAll()">Fetch All Start</button></th>
      <th>End EXP <button onclick="fetchEndAll()">Fetch All End</button></th>
      <th>Time / EXP</th>
      <th>Rate</th>
      <th>Fee</th>
    </tr>
  </thead>
  <tbody id="active-body"></tbody>
</table>

<button onclick="addRow()">+ Add Row</button>

<h2>Completed Sessions</h2>

<div class="filter-bar">
  <input id="completed-filter-start" type="datetime-local">
  <button onclick="setCompletedFilterNow('completed-filter-start')">Now</button>

  <input id="completed-filter-end" type="datetime-local">
  <button onclick="setCompletedFilterNow('completed-filter-end')">Now</button>

  <button onclick="applyCompletedFilter()">Apply</button>
  <button onclick="clearCompletedFilter()">Clear</button>
</div>

<div id="completed-summary">
  Total Mesos: - | Total EXP: - | Avg EXP/Hr: -
</div>

<table class="exp-table">
  <thead>
    <tr>
      <th>Character</th>
      <th>Start</th>
      <th>End</th>
      <th>Time / EXP</th>
      <th>Rate</th>
      <th>Fee</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="completed-body"></tbody>
</table>

<script src="exptable.js"></script>
<script src="script.js"></script>

</body>
</html>
