<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Maple EXP Viewer</h1>

</tr>

<tr>
<td><input id="ign4" placeholder="Character 4"></td>

</tr>

<tr>
<td><input id="ign5" placeholder="Character 5"></td>
<td id="result5"></td>
</tr>

<tr>
<td><input id="ign6" placeholder="Character 6"></td>
<td id="result6"></td>
</tr>

<tr>
<td><input id="ign7" placeholder="Character 7"></td>
<td id="result7"></td>
</tr>

<tr>
<td><input id="ign8" placeholder="Character 8"></td>
<td id="result8"></td>
</tr>

<tr>
<td><input id="ign9" placeholder="Character 9"></td>
<td id="result9"></td>
</tr>

<tr>
<td><input id="ign10" placeholder="Character 10"></td>
<td id="result10"></td>
</tr>

</tbody>

</table>

<button onclick="fetchCharacters()">Fetch EXP</button>

<script src="exptable.js"></script>
<script src="script.js"></script>

</body>
</html>
